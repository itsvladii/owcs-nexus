# .github/workflows/sync-elo.yml
name: Sync ELO Rankings

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: # lets you trigger it manually from GitHub UI too

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://owcs-wiki.vercel.app/api/syncELO