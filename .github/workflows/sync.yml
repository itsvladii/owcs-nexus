name: Global ELO Sync

on:
  schedule:
    # This runs every 3 hours (00:00, 03:00, 06:00, etc. UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch: # This adds a "Run manually" button in GitHub Actions

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Vercel Sync Endpoint
        run: |
          curl -X GET "https://owcs-wiki.vercel.app/api/syncELO" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -f